<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StartSmart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Main view -->
  <div id="mainView">
    <header class="header">
      <div class="header-left">
        <svg class="header-icon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true">
          <path fill-rule="evenodd" d="M14.615 1.595a.75.75 0 01.359.852L12.982 9.75h7.268a.75.75 0 01.548 1.262l-10.5 11.25a.75.75 0 01-1.272-.71l1.992-7.303H3.268a.75.75 0 01-.548-1.262l10.5-11.25a.75.75 0 01.913-.142z" clip-rule="evenodd"/>
        </svg>
        <span class="header-title">StartSmart</span>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div class="mode-toggle" role="group" aria-label="Active mode">
      <button class="toggle-btn" id="workToggle" data-mode="work">Work</button>
      <button class="toggle-btn" id="personalToggle" data-mode="personal">Personal</button>
    </div>

    <div class="section-header">
      <span class="section-label">Projects</span>
      <button class="add-link" id="addProjectBtn">+ Add</button>
    </div>

    <div id="projectList" class="project-list" role="list"></div>

    <div class="footer-action">
      <button class="open-btn" id="openBtn" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13" aria-hidden="true" style="flex-shrink:0">
          <path d="M5 3l14 9-14 9V3z"/>
        </svg>
        <span id="openBtnLabel">No project selected</span>
      </button>
    </div>

    <footer class="footer">Created by Ajmal Nasumudeen</footer>
  </div>

  <!-- Edit / Add project panel (full-popup overlay) -->
  <div id="editPanel" class="edit-panel hidden" role="dialog" aria-modal="true">
    <div class="edit-header">
      <span id="editPanelTitle" class="edit-title">Edit Project</span>
      <button class="icon-btn" id="closeEditBtn" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="edit-body">
      <label for="editName" class="field-label">Project name</label>
      <input type="text" id="editName" class="field-input" placeholder="e.g. Campaign Hub" autocomplete="off" />

      <label for="editUrls" class="field-label" style="margin-top:12px">
        URLs <span class="field-hint">(one per line)</span>
      </label>
      <textarea id="editUrls" class="field-textarea" rows="5" placeholder="https://example.com&#10;https://another.com"></textarea>

      <!-- Bookmark picker -->
      <button class="bm-toggle-btn" id="bmToggleBtn" type="button">
        <svg viewBox="0 0 20 20" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M5 3h10a1 1 0 011 1v12l-6-3-6 3V4a1 1 0 011-1z"/>
        </svg>
        Add from bookmarks
      </button>

      <div id="bookmarkPicker" class="bm-picker hidden">
        <input type="search" id="bmSearch" class="bm-search" placeholder="Search bookmarks..." autocomplete="off" />
        <div id="bmList" class="bm-list"></div>
      </div>
    </div>

    <div class="edit-footer">
      <button class="btn-danger" id="deleteProjectBtn">Delete</button>
      <button class="btn-primary" id="saveProjectBtn">Save</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
